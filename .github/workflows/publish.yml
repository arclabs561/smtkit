name: publish

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - smtkit
          - smtkit-core
          - smtkit-smtlib
          - smtkit-z3
      confirm:
        description: "Type 'publish' to publish to crates.io"
        required: true
        default: "dry-run"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Guard
        run: |
          if [ "${INPUTS_CONFIRM}" != "publish" ]; then
            echo "Refusing to publish: set workflow input confirm=publish"
            exit 1
          fi
        env:
          INPUTS_CONFIRM: ${{ inputs.confirm }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # z3-inproc needs a system Z3; all-features cannot build on a
          # plain runner. Default features are the supported gate.
          feature-group: default-features

      - name: Authenticate (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish (${{ inputs.crate }})
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          INPUTS_CRATE: ${{ inputs.crate }}
        run: cargo publish -p "${INPUTS_CRATE}"
