name: ci

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: install rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "stable"
          components: rustfmt

      - name: rustfmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      # Default features generate SMT-LIB2 scripts with no solver, so these
      # examples run without z3. The z3-inproc examples (constrained_soft_path,
      # *_inproc, pareto_frontier) need a system Z3 and are excluded.
      - name: run example assertions
        run: |
          cargo run --example graph_coloring
          cargo run --example maximize_red
          cargo run --example ontology_consistency
          cargo run --example session_determinism_hooks
          cargo run --example enumerate_graph_coloring_session

